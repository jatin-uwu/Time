_schema-version: 3.3.0
ID: Employee-Timesheet
version: 1.0.0
description: "Employee Timesheet"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: Employee-Timesheet-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    properties:
      # Cloud Foundry runs in UTC by default; the timesheet fill-window / Friday
      # submit-gate / reminder logic all assume the business day in IST. Pin the
      # process timezone so server-side date checks match the users' calendar day.
      TZ: Asia/Kolkata
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: Employee-Timesheet-db
      - name: Employee-Timesheet-auth

  - name: Employee-Timesheet-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: Employee-Timesheet-db
  - name: Employee-Timesheet
    type: approuter.nodejs
    path: app/
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: Employee-Timesheet-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: Employee-Timesheet-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: Employee-Timesheet-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: Employee-Timesheet-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            # ${default-uri} resolves to the FULL app host (no scheme), so the
            # exact-host form below matches the approuter callback
            # (https://<host>/login/callback). The previous "https://*~{...}"
            # put a stray '*' before the host, which can't match an empty
            # segment → "redirect_uri does not match" at login.
            - https://~{app-api/app-uri}/**
            - https://*.~{app-api/app-uri}/**
        role-collections:
          - name: 'Employee (Timesheet ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Employee'
          - name: 'Manager (Timesheet ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Manager'
          - name: 'HR (Timesheet ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.HR'
    requires:
      - name: app-api

