<h2 style="margin:0 0 12px;color:#dc2626;font-size:20px;">❌ Timesheet Rejected</h2>
<p style="margin:0 0 8px;">Hi {{EmployeeName}},</p>
<p style="margin:0 0 16px;">Your timesheet for the week of <b>{{WeekStart}}</b> has been <b style="color:#dc2626;">rejected</b>{{ByLine}}. Please review the remarks and resubmit.</p>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;">
  <tr><td style="padding:10px 14px;font-size:14px;"><b style="color:#64748b;">Week</b> &nbsp; {{WeekStart}} → {{WeekEnd}}</td></tr>
  <tr><td style="padding:10px 14px;font-size:14px;border-top:1px solid #fee2e2;"><b style="color:#64748b;">Rejected By</b> &nbsp; {{ManagerName}}</td></tr>
  <tr><td style="padding:10px 14px;font-size:14px;border-top:1px solid #fee2e2;"><b style="color:#64748b;">Reason</b><div style="color:#334155;">{{Remarks}}</div></td></tr>
</table>
<p style="margin:18px 0 0;">
  <a href="{{ActionUrl}}" style="display:inline-block;background:{{BrandColor}};color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:8px;font-weight:600;">Fix &amp; Resubmit</a>
</p>
