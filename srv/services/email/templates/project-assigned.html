<h2 style="margin:0 0 12px;color:#0f172a;font-size:20px;">📁 Project Assignment</h2>
<p style="margin:0 0 8px;">Hi {{EmployeeName}},</p>
<p style="margin:0 0 16px;">You have been assigned to the project <b style="color:#0f172a;">{{ProjectName}}</b> as <b>{{Role}}</b>{{ByLine}}.</p>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;">
  <tr><td style="padding:10px 14px;font-size:14px;"><b style="color:#64748b;">Project</b> &nbsp; {{ProjectName}}</td></tr>
  <tr><td style="padding:10px 14px;font-size:14px;border-top:1px solid #eef2f7;"><b style="color:#64748b;">Role</b> &nbsp; {{Role}} &nbsp;&nbsp; <b style="color:#64748b;">Allocation</b> &nbsp; {{Allocation}}</td></tr>
  <tr><td style="padding:10px 14px;font-size:14px;border-top:1px solid #eef2f7;"><b style="color:#64748b;">Project POC</b> &nbsp; {{ManagerName}}</td></tr>
</table>
<p style="margin:18px 0 0;">
  <a href="{{ActionUrl}}" style="display:inline-block;background:{{BrandColor}};color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:8px;font-weight:600;">Open Project</a>
</p>
