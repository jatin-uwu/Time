<h2 style="margin:0 0 12px;color:#0f172a;font-size:20px;">🔒 Password Reset</h2>
<p style="margin:0 0 8px;">Hi {{EmployeeName}},</p>
<p style="margin:0 0 16px;">We received a request to reset your password. Click the button below to set a new one. If you didn't request this, you can safely ignore this email.</p>
<p style="margin:0 0 16px;color:#64748b;font-size:13px;">This link expires in {{ExpiryMinutes}} minutes.</p>
<p style="margin:18px 0 0;">
  <a href="{{ResetUrl}}" style="display:inline-block;background:{{BrandColor}};color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:8px;font-weight:600;">Reset Password</a>
</p>
